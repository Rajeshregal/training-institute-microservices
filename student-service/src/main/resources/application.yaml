server:
  port: 8082

spring:
  application:
    name: student-service

  datasource:
    url: jdbc:postgresql://localhost:5432/training_institute_db
    username: postgres
    password: system
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true