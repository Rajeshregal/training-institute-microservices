server:
  port: 9090

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
spring:
  application:
    name: api-gateway-service

  redis:
    host: localhost
    port: 6379

  cloud:
    gateway:
      routes:

        # AUTH SERVICE
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**

        # STUDENT SERVICE
        - id: student-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/student/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 2
                redis-rate-limiter.burstCapacity: 4
                key-resolver: "#{@userKeyResolver}"

        # TEACHER SERVICE
        - id: teacher-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/teacher/**

        # COURSE SERVICE
        - id: course-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/course/**
          filters:
            - name: CircuitBreaker
              args:
                name: curseServiceCircuitBreaker
                fallbackUri: forward:/fallback/course

        # PAYMENT SERVICE
        - id: payment-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/payment/**

management:
  endpoints:
    web:
      exposure:
        include: "*"