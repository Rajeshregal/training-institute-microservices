server:
  port: 8082

spring:
  datasource:
    url: jdbc:postgresql://postgres-db:5432/training_institute_db
    username: postgres
    password: system

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

eureka:
  client:
    service-url:
      defaultZone: http://host.docker.internal:8761/eureka/